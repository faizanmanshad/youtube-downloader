<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local YouTube Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Local YouTube Video Downloader</h1>
            <div class="disclaimer">
                <strong>Disclaimer:</strong> Personal use only. User assumes all responsibility for copyright compliance.
            </div>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
                <button type="button" id="fetchBtn">Fetch Video</button>
                <button type="button" id="clearBtn" class="secondary">Clear</button>
            </div>

            <div id="fetchLoading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing video...</p>
            </div>

            <div id="restrictionNote" class="hidden" style="background: #222; padding: 10px; border-radius: 5px; font-size: 0.8rem; border: 1px dashed #555; margin-bottom: 15px; color: #aaa;">
                ⚠️ <strong>Note:</strong> If the video says "Watch on YouTube", the creator has disabled embedding for this video. You can still download it below.
            </div>

            <div id="errorMessage" class="error-hidden" style="color: #ff4444; margin: 10px 0;"></div>

            <div id="previewSection" class="hidden">
                <div class="video-card">
                    <div id="playerContainer"></div>
                    <div class="info">
                        <h3 id="videoTitle"></h3>
                        <p id="channelName"></p>
                        <p id="videoDuration" style="color: #ff0000; font-weight: bold;"></p>
                        <p id="videoSize" style="font-weight: bold; color: #00ff00;"></p>
                        
                        <div class="download-controls">
                            <select id="qualitySelect">
                                <option value="">Select Quality</option>
                            </select>
                            <button type="button" id="downloadBtn">Download Video</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="progressSection" class="hidden">
                </div>
        </main>
    </div>
    <script src="script.js?v=new"></script>
</body>
</html>
